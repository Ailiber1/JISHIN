<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>JISHIN_ — Shake. Judge. Survive.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SECTION: CSS VARIABLES & RESET
   ============================================================ */
:root {
  --safety-orange: #ff6b00;
  --safety-orange-light: #ff8c33;
  --safety-orange-dark: #cc5500;
  --safety-orange-glow: rgba(255, 107, 0, 0.6);
  --safety-orange-dim: rgba(255, 107, 0, 0.3);
  --alert-red: #ff3333;
  --safe-green: #00ff41;
  --bg-dark: #0a0a0f;
  --bg-panel: rgba(20, 12, 0, 0.85);
  --bg-overlay: rgba(0, 0, 0, 0.92);
  --border-glow: #ff6b00;
  --text-primary: #ffffff;
  --text-secondary: #cccccc;
  --text-dim: #666666;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  background: var(--bg-dark);
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(80,40,0,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(60,30,0,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 0% 50%, rgba(50,25,0,0.1) 0%, transparent 40%),
    radial-gradient(ellipse at 100% 50%, rgba(50,25,0,0.1) 0%, transparent 40%);
  color: var(--text-primary);
  font-family: 'Share Tech Mono', 'Noto Sans JP', monospace;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  -webkit-touch-callout: none;
}

/* ============================================================
   SECTION: SCREEN MANAGEMENT
   ============================================================ */
.screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.3s ease;
}
.screen.active { display: flex; }

/* ============================================================
   SECTION: TRAUMA WARNING
   ============================================================ */
#warning-screen {
  z-index: 1000;
  background: #000;
}
#warning-box {
  max-width: 500px;
  width: 90%;
  padding: 40px 30px;
  border: 1px solid rgba(255, 107, 0, 0.4);
  text-align: center;
  background: rgba(20, 12, 0, 0.6);
  box-shadow: 0 0 30px rgba(255, 107, 0, 0.15);
}
#warning-box p {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(14px, 3.5vw, 17px);
  line-height: 2;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
#warning-box .warning-en {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(12px, 2.5vw, 14px);
  line-height: 1.8;
  color: var(--text-dim);
  margin-bottom: 30px;
}
#btn-warning-ok {
  font-family: 'Share Tech Mono', 'Noto Sans JP', monospace;
  font-size: 16px;
  color: var(--safety-orange);
  background: transparent;
  border: 1px solid var(--safety-orange);
  padding: 12px 40px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.3s ease;
  box-shadow: 0 0 8px rgba(255, 107, 0, 0.3);
}
#btn-warning-ok:hover {
  background: rgba(255, 107, 0, 0.15);
  box-shadow: 0 0 20px rgba(255, 107, 0, 0.6);
}

/* ============================================================
   SECTION: SPLASH / QUOTE SCREEN
   ============================================================ */
#splash-screen {
  z-index: 999;
  background: #000;
  cursor: pointer;
}
#splash-quote {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(16px, 4vw, 22px);
  color: var(--safety-orange);
  text-align: center;
  opacity: 0;
  line-height: 1.8;
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(255, 107, 0, 0.7), 0 0 30px rgba(255, 107, 0, 0.4);
  padding: 0 20px;
  max-width: 600px;
}
#splash-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(255, 140, 51, 0.6);
  text-align: center;
  opacity: 0;
  margin-top: 16px;
  letter-spacing: 1px;
  padding: 0 20px;
}
#splash-skip {
  position: absolute;
  bottom: calc(30px + env(safe-area-inset-bottom, 0px));
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 2px;
  opacity: 0;
}

/* ============================================================
   SECTION: TITLE SCREEN
   ============================================================ */
#title-screen {
  z-index: 200;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 0;
}

/* Matrix Rain */
#matrix-bg {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.matrix-col {
  position: absolute; top: 0;
  width: 22px; font-size: 16px; line-height: 1.2;
  white-space: pre;
  color: var(--safety-orange);
  opacity: 0.65;
  text-shadow: 0 0 8px rgba(255,107,0,0.9), 0 0 20px rgba(255,107,0,0.5), 0 0 40px rgba(255,80,0,0.25);
  animation: matrixFall linear infinite;
  writing-mode: vertical-rl;
}
@keyframes matrixFall {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}
.matrix-col-pulse { animation: matrixFall linear infinite, orangePulse 2s ease-in-out infinite alternate; }
.matrix-col-flash { animation: matrixFall linear infinite, orangeFlash 4s ease-in-out infinite; }
@keyframes orangePulse { 0% { opacity: 0.4; } 100% { opacity: 0.8; } }
@keyframes orangeFlash { 0%, 93% { opacity: 0.55; } 96% { opacity: 1.0; } 100% { opacity: 0.55; } }

/* Overlays */
#orange-glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 50% 15%, rgba(255,107,0,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(200,80,0,0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 50%, rgba(255,107,0,0.05) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 50%, rgba(255,107,0,0.05) 0%, transparent 40%);
  pointer-events: none; z-index: 1;
}
.scanlines {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(255,107,0,0.012) 2px, rgba(255,107,0,0.012) 3px);
  opacity: 0.2; pointer-events: none; z-index: 100;
}
.vignette {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 70%, rgba(0,0,0,0.3) 100%);
  pointer-events: none; z-index: 99;
}

/* Title Logo */
#title-logo {
  z-index: 201; text-align: center; margin-top: 30px;
  position: relative;
  padding: 20px 40px;
}
#title-logo h1 {
  font-family: 'Share Tech Mono', monospace;
  font-weight: 700;
  font-size: clamp(48px, 14vw, 120px);
  line-height: 1;
  letter-spacing: 8px;
  color: #fff;
  text-shadow:
    0 0 10px rgba(255,107,0,0.8),
    0 0 30px rgba(255,107,0,0.5),
    0 0 60px rgba(255,107,0,0.3);
  text-align: center;
  animation: titleGlow 3s ease-in-out infinite alternate;
}
#title-cursor {
  display: inline-block;
  color: var(--safety-orange);
  animation: cursorBlink 1s step-end infinite;
}
@keyframes cursorBlink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}
@keyframes titleGlow {
  0% {
    text-shadow:
      0 0 10px rgba(255,107,0,0.6),
      0 0 25px rgba(255,107,0,0.35),
      0 0 50px rgba(255,107,0,0.2);
  }
  100% {
    text-shadow:
      0 0 15px rgba(255,107,0,0.9),
      0 0 40px rgba(255,107,0,0.6),
      0 0 80px rgba(255,107,0,0.35);
  }
}
#title-logo .subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(11px, 2.5vw, 16px);
  color: #e0e0e0;
  letter-spacing: 4px;
  margin-top: 10px;
  text-shadow: 0 0 6px rgba(255,255,255,0.3);
}

/* ============================================================
   SECTION: UI PANEL & COMPONENTS
   ============================================================ */
.ui-panel {
  background: var(--bg-panel);
  border: 1px solid var(--safety-orange);
  padding: 24px 28px;
  position: relative;
  z-index: 10;
  width: min(420px, 90%);
  margin: 16px auto;
  box-shadow: 0 0 8px rgba(255,107,0,0.4), 0 0 20px rgba(255,107,0,0.15), inset 0 0 8px rgba(255,107,0,0.03);
}
.ui-panel::before,
.ui-panel::after {
  content: ''; position: absolute;
  width: 14px; height: 14px;
  border-color: var(--safety-orange-light);
  border-style: solid;
}
.ui-panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.ui-panel::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.corner-bl, .corner-br {
  position: absolute; width: 14px; height: 14px;
  border-color: var(--safety-orange-light);
  border-style: solid;
}
.corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
.corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

/* Buttons */
.btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }

.btn {
  font-family: 'Share Tech Mono', 'Noto Sans JP', monospace;
  background: transparent;
  padding: 13px 20px;
  font-size: 15px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  text-align: center;
  width: 100%;
}
.btn::before {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0;
  transition: height 0.3s ease;
  z-index: -1;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

.btn-neon {
  border: 1px solid var(--safety-orange);
  color: #ffffff;
  box-shadow: 0 0 6px rgba(255,107,0,0.3), inset 0 0 6px rgba(255,107,0,0.03);
}
.btn-neon::before { background: rgba(255,107,0,0.1); }
.btn-neon:hover {
  background: rgba(255,107,0,0.12);
  box-shadow: 0 0 20px rgba(255,107,0,0.6), inset 0 0 20px rgba(255,107,0,0.08);
}
.btn-neon:hover::before { height: 100%; }

.btn-thin {
  border: 1px solid rgba(255,107,0,0.4);
  color: #ffcc99;
}
.btn-thin:hover {
  border-color: var(--safety-orange);
  color: #ffffff;
  box-shadow: 0 0 12px rgba(255,107,0,0.5);
}

/* Panel Footer */
.panel-footer {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-top: 16px; padding-top: 14px;
  border-top: 1px solid rgba(255,107,0,0.25);
  flex-wrap: wrap;
}
.lang-btn {
  background: transparent; border: 1px solid transparent;
  color: #997755; font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px; padding: 4px 10px; cursor: pointer;
  transition: all 0.3s;
}
.lang-btn.active {
  color: var(--safety-orange); border-color: rgba(255,107,0,0.4);
}
.lang-btn:hover { color: var(--safety-orange); }
.footer-divider { color: #997755; font-size: 14px; }
.bgm-btn {
  background: transparent; border: 1px solid transparent;
  font-size: 13px; padding: 4px 10px; cursor: pointer;
  transition: all 0.3s; font-family: 'Share Tech Mono', monospace;
}
.bgm-btn.bgm-on { color: var(--safety-orange); border-color: rgba(255,107,0,0.4); }
.bgm-btn.bgm-off { color: var(--text-dim); text-decoration: line-through; }

.copyright {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-top: 8px;
  z-index: 10;
}

/* ============================================================
   SECTION: RESPONSIVE
   ============================================================ */
@media (max-width: 480px) {
  .ui-panel { padding: 18px 16px; }
  .btn { padding: 11px 14px; font-size: 13px; }
}
@media (hover: hover) and (pointer: fine) {
  .mobile-only { display: none !important; }
}
@media (hover: none) and (pointer: coarse) {
  .pc-only { display: none !important; }
}

/* 横向きスマホ: タイトル画面コンパクト化 */
@media (orientation: landscape) and (max-height: 500px) {
  #title-logo { margin-top: 5px; padding: 8px 20px; }
  #title-logo h1 { font-size: clamp(32px, 8vw, 56px); }
  #title-logo .subtitle { font-size: 10px; margin-top: 4px; }
  .ui-panel { padding: 10px 14px; margin: 6px auto; }
  .btn { padding: 8px 12px; font-size: 12px; }
  .btn-group { gap: 6px; margin-top: 8px; }
  .panel-footer { margin-top: 8px; padding-top: 8px; }
  .copyright { margin-top: 4px; }
}

/* 縦向きスマホ: コンパクト化 */
@media (max-width: 500px) and (orientation: portrait) {
  #title-logo { margin-top: 15px; }
  .ui-panel { margin: 10px auto; }
}

</style>
</head>
<body>

<!-- ============================================================
     SECTION: TRAUMA WARNING SCREEN
     ============================================================ -->
<div id="warning-screen" class="screen active">
  <div id="warning-box">
    <p>
      このゲームには地震の揺れ・落下物・<br>
      警報音の演出が含まれます。<br><br>
      過去の地震でつらい経験をされた方は、<br>
      無理せずプレイを中断してください。
    </p>
    <p class="warning-en">
      This game contains earthquake simulations,<br>
      including shaking, falling objects, and<br>
      alarm sounds.
    </p>
    <button id="btn-warning-ok">OK</button>
  </div>
</div>

<!-- ============================================================
     SECTION: SPLASH / QUOTE SCREEN
     ============================================================ -->
<div id="splash-screen" class="screen">
  <div id="splash-quote"></div>
  <div id="splash-sub"></div>
  <div id="splash-skip">TAP TO SKIP</div>
</div>

<!-- ============================================================
     SECTION: TITLE SCREEN
     ============================================================ -->
<div id="title-screen" class="screen">
  <div id="matrix-bg"></div>
  <div id="orange-glow"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <div id="title-logo">
    <h1>JISHIN<span id="title-cursor">_</span></h1>
    <div class="subtitle" data-i18n="SUBTITLE"></div>
  </div>

  <div class="ui-panel">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>
    <div class="btn-group">
      <button class="btn btn-neon" id="btn-story" data-i18n="BTN_STORY" disabled></button>
      <button class="btn btn-neon" id="btn-multi" data-i18n="BTN_MULTI" disabled></button>
      <button class="btn btn-neon" id="btn-training" data-i18n="BTN_TRAINING" disabled></button>
    </div>
    <div class="btn-group" style="margin-top:10px;">
      <button class="btn btn-thin" id="btn-ranking" data-i18n="BTN_RANKING" disabled></button>
      <button class="btn btn-thin" id="btn-rules" data-i18n="BTN_RULES" disabled></button>
    </div>
    <div class="panel-footer">
      <button class="lang-btn active" id="lang-ja">日本語</button>
      <span class="footer-divider">|</span>
      <button class="lang-btn" id="lang-en">English</button>
      <span class="footer-divider">|</span>
      <button class="bgm-btn bgm-on" id="bgm-toggle">BGM: ON</button>
    </div>
  </div>
  <div class="copyright">© PLAY GATE_</div>
</div>

<!-- ============================================================
     SECTION: JAVASCRIPT
     ============================================================ -->
<script>
// ============================================================
// SECTION: CONSTANTS
// ============================================================
const QUOTES = [
  { ja: '「備えあれば、憂いなし。」', en: '"If you are prepared, you don\'t have to worry."' },
  { ja: '「天災は忘れた頃にやってくる。」\n— 寺田寅彦', en: '"Natural disasters come when you have forgotten them."\n— Torahiko Terada' },
  { ja: '「その一秒の判断が、命を分ける。」', en: '"One second of judgment can save your life."' },
  { ja: '「知識は最強の防災グッズだ。」', en: '"Knowledge is the ultimate survival tool."' },
  { ja: '「地震は止められない。\nでも、備えることはできる。」', en: '"You can\'t stop an earthquake.\nBut you can prepare."' },
  { ja: '「落ちてこない、倒れてこない、\n移動してこない場所へ。」', en: '"Find a spot where nothing falls,\ntopples, or slides toward you."' },
  { ja: '「慌てない者が、生き残る。」', en: '"Those who stay calm, survive."' },
  { ja: '「訓練でできないことは、\n本番でもできない。」', en: '"What you can\'t do in practice,\nyou can\'t do in real life."' },
  { ja: '「自分の命は、自分で守る。」', en: '"Protect your own life, by your own judgment."' },
  { ja: '「揺れが止まっても、\n危険は止まらない。」', en: '"The shaking stops, but the danger doesn\'t."' }
];

const I18N = {
  ja: {
    SUBTITLE: '揺れた。判断しろ。生き延びろ。',
    BTN_STORY: 'ストーリーモード',
    BTN_MULTI: 'マルチプレイ',
    BTN_TRAINING: '訓練モード',
    BTN_RANKING: 'ランキング',
    BTN_RULES: 'ルール / 防災知識'
  },
  en: {
    SUBTITLE: 'Shake. Judge. Survive.',
    BTN_STORY: 'STORY MODE',
    BTN_MULTI: 'MULTIPLAYER',
    BTN_TRAINING: 'TRAINING MODE',
    BTN_RANKING: 'RANKING',
    BTN_RULES: 'RULES / KNOWLEDGE'
  }
};

// マトリックス文字セット（防災関連漢字 + カタカナ + 数字）
const MATRIX_CHARS = '地震避難防災安全震度津波警報揺火災備蓄救助消防庁訓練危険倒壊停電アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789';

// ============================================================
// SECTION: GAME STATE
// ============================================================
let currentLang = 'ja';
let bgmEnabled = true;
let warningShown = false;

// ============================================================
// SECTION: UTILITY
// ============================================================
function escapeHTML(str) {
  if (typeof str !== 'string') return str;
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ============================================================
// SECTION: I18N
// ============================================================
function applyI18N() {
  const dict = I18N[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (dict[key]) el.textContent = dict[key];
  });
}

// ============================================================
// SECTION: SCREEN MANAGEMENT
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
}

// ============================================================
// SECTION: TRAUMA WARNING
// ============================================================
function initWarning() {
  // 初回のみ表示（OKを押すとlocalStorageに保存）
  const seen = localStorage.getItem('jishin_warning_seen');
  if (seen === 'true') {
    warningShown = true;
    showSplash();
    return;
  }
  showScreen('warning-screen');
  const btn = document.getElementById('btn-warning-ok');
  btn.addEventListener('click', function handler() {
    btn.removeEventListener('click', handler);
    localStorage.setItem('jishin_warning_seen', 'true');
    warningShown = true;
    showSplash();
  });
  btn.addEventListener('touchstart', function handler(e) {
    e.preventDefault();
    btn.removeEventListener('touchstart', handler);
    localStorage.setItem('jishin_warning_seen', 'true');
    warningShown = true;
    showSplash();
  });
}

// ============================================================
// SECTION: SPLASH / QUOTE
// ============================================================
let splashTimeout = null;

function showSplash() {
  showScreen('splash-screen');
  const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  const quoteEl = document.getElementById('splash-quote');
  const subEl = document.getElementById('splash-sub');
  const skipEl = document.getElementById('splash-skip');

  quoteEl.textContent = quote[currentLang === 'ja' ? 'ja' : 'en'];
  subEl.textContent = currentLang === 'ja' ? quote.en : quote.ja;

  // フェードインアニメーション
  quoteEl.style.opacity = '0';
  subEl.style.opacity = '0';
  skipEl.style.opacity = '0';

  setTimeout(() => {
    quoteEl.style.transition = 'opacity 1s ease';
    quoteEl.style.opacity = '1';
  }, 300);
  setTimeout(() => {
    subEl.style.transition = 'opacity 0.8s ease';
    subEl.style.opacity = '1';
  }, 800);
  setTimeout(() => {
    skipEl.style.transition = 'opacity 0.5s ease';
    skipEl.style.opacity = '1';
  }, 1500);

  // 4秒後にタイトルへ
  splashTimeout = setTimeout(() => {
    fadeToTitle();
  }, 4000);

  // タップ/クリックでスキップ
  const splash = document.getElementById('splash-screen');
  function skipHandler(e) {
    e.preventDefault();
    splash.removeEventListener('click', skipHandler);
    splash.removeEventListener('touchstart', skipHandler);
    if (splashTimeout) clearTimeout(splashTimeout);
    fadeToTitle();
  }
  splash.addEventListener('click', skipHandler);
  splash.addEventListener('touchstart', skipHandler);
}

function fadeToTitle() {
  const splash = document.getElementById('splash-screen');
  splash.style.transition = 'opacity 0.6s ease';
  splash.style.opacity = '0';
  setTimeout(() => {
    splash.style.opacity = '';
    splash.style.transition = '';
    showTitle();
  }, 600);
}

// ============================================================
// SECTION: MATRIX BACKGROUND
// ============================================================
function createMatrixBg() {
  const container = document.getElementById('matrix-bg');
  if (!container) return;
  container.innerHTML = '';

  const colCount = Math.floor(window.innerWidth / 22);
  for (let i = 0; i < colCount; i++) {
    const col = document.createElement('div');
    col.className = 'matrix-col';

    // ランダムな明度バリエーション
    const rand = Math.random();
    if (rand < 0.05) {
      col.className = 'matrix-col matrix-col-flash';
    } else if (rand < 0.35) {
      col.className = 'matrix-col matrix-col-pulse';
    }

    // 文字列生成（防災関連漢字を含む — 画面高さを十分カバーする文字数）
    const len = 30 + Math.floor(Math.random() * 25);
    let text = '';
    for (let j = 0; j < len; j++) {
      text += MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
    }
    col.textContent = text;

    col.style.left = (i * 22) + 'px';
    col.style.animationDuration = (5 + Math.random() * 10) + 's';
    col.style.animationDelay = (-Math.random() * 15) + 's';

    container.appendChild(col);
  }
}

// ============================================================
// SECTION: TITLE SCREEN
// ============================================================
function showTitle() {
  showScreen('title-screen');
  applyI18N();
  createMatrixBg();
}

// ============================================================
// SECTION: EVENT LISTENERS
// ============================================================
function initEventListeners() {
  // 言語切替
  document.getElementById('lang-ja').addEventListener('click', () => {
    currentLang = 'ja';
    localStorage.setItem('jishin_language', 'ja');
    document.getElementById('lang-ja').classList.add('active');
    document.getElementById('lang-en').classList.remove('active');
    applyI18N();
  });
  document.getElementById('lang-en').addEventListener('click', () => {
    currentLang = 'en';
    localStorage.setItem('jishin_language', 'en');
    document.getElementById('lang-en').classList.add('active');
    document.getElementById('lang-ja').classList.remove('active');
    applyI18N();
  });

  // BGMトグル
  document.getElementById('bgm-toggle').addEventListener('click', () => {
    bgmEnabled = !bgmEnabled;
    localStorage.setItem('jishin_bgm', bgmEnabled ? 'on' : 'off');
    const btn = document.getElementById('bgm-toggle');
    btn.textContent = 'BGM: ' + (bgmEnabled ? 'ON' : 'OFF');
    btn.className = 'bgm-btn ' + (bgmEnabled ? 'bgm-on' : 'bgm-off');
  });

  // リサイズ対応（マトリックス背景再生成 + レイアウト）
  let resizeTimer = null;
  function handleResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const isLandscape = w > h;
    document.body.classList.toggle('landscape', isLandscape);
    document.body.classList.toggle('portrait', !isLandscape);

    // マトリックス背景を再生成（タイトル画面表示中のみ）
    if (document.getElementById('title-screen').classList.contains('active')) {
      createMatrixBg();
    }
  }

  window.addEventListener('resize', () => {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(handleResize, 150);
  });
  window.addEventListener('orientationchange', () => {
    setTimeout(handleResize, 100);
    setTimeout(handleResize, 300);
  });

  // 初回レイアウト設定
  handleResize();

  // タッチイベントのスクロール防止（ゲーム画面用）
  document.addEventListener('touchmove', function(e) {
    // モーダルやスクロール可能な要素内では許可
    if (e.target.closest('.ui-panel') || e.target.closest('.modal-box')) return;
    if (e.target.closest('#title-screen')) return;
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
}

// ============================================================
// SECTION: INIT
// ============================================================
function init() {
  // ローカルストレージから設定読み込み
  const savedLang = localStorage.getItem('jishin_language');
  if (savedLang === 'en') {
    currentLang = 'en';
    document.getElementById('lang-en').classList.add('active');
    document.getElementById('lang-ja').classList.remove('active');
  }
  const savedBgm = localStorage.getItem('jishin_bgm');
  if (savedBgm === 'off') {
    bgmEnabled = false;
    const btn = document.getElementById('bgm-toggle');
    btn.textContent = 'BGM: OFF';
    btn.className = 'bgm-btn bgm-off';
  }

  initEventListeners();
  initWarning();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
