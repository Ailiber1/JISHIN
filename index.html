<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>JISHIN_ — Shake. Judge. Survive.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SECTION: CSS VARIABLES & RESET
   ============================================================ */
:root {
  --safety-orange: #ff6b00;
  --safety-orange-light: #ff8c33;
  --safety-orange-dark: #cc5500;
  --safety-orange-glow: rgba(255, 107, 0, 0.6);
  --safety-orange-dim: rgba(255, 107, 0, 0.3);
  --alert-red: #ff3333;
  --safe-green: #00ff41;
  --bg-dark: #0a0a0f;
  --bg-panel: rgba(20, 12, 0, 0.85);
  --bg-overlay: rgba(0, 0, 0, 0.92);
  --border-glow: #ff6b00;
  --text-primary: #ffffff;
  --text-secondary: #cccccc;
  --text-dim: #666666;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
  background: var(--bg-dark);
  background-image:
    radial-gradient(ellipse at 50% 0%, rgba(80,40,0,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(60,30,0,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 0% 50%, rgba(50,25,0,0.1) 0%, transparent 40%),
    radial-gradient(ellipse at 100% 50%, rgba(50,25,0,0.1) 0%, transparent 40%);
  color: var(--text-primary);
  font-family: 'Share Tech Mono', 'Noto Sans JP', monospace;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  -webkit-touch-callout: none;
}

/* ============================================================
   SECTION: SCREEN MANAGEMENT
   ============================================================ */
.screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100dvh; height: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.3s ease;
}
@supports (height: 100dvh) {
  .screen { height: 100dvh; }
}
.screen.active { display: flex; }

/* ============================================================
   SECTION: TRAUMA WARNING
   ============================================================ */
#warning-screen {
  z-index: 1000;
  background: #000;
}
#warning-box {
  max-width: 500px;
  width: 90%;
  padding: 40px 30px;
  border: 1px solid rgba(255, 107, 0, 0.4);
  text-align: center;
  background: rgba(20, 12, 0, 0.6);
  box-shadow: 0 0 30px rgba(255, 107, 0, 0.15);
}
#warning-box p {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(14px, 3.5vw, 17px);
  line-height: 2;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
#warning-box .warning-en {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(12px, 2.5vw, 14px);
  line-height: 1.8;
  color: var(--text-dim);
  margin-bottom: 30px;
}
#btn-warning-ok {
  font-family: 'Share Tech Mono', 'Noto Sans JP', monospace;
  font-size: 16px;
  color: var(--safety-orange);
  background: transparent;
  border: 1px solid var(--safety-orange);
  padding: 12px 40px;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.3s ease;
  box-shadow: 0 0 8px rgba(255, 107, 0, 0.3);
}
#btn-warning-ok:hover {
  background: rgba(255, 107, 0, 0.15);
  box-shadow: 0 0 20px rgba(255, 107, 0, 0.6);
}

/* ============================================================
   SECTION: SPLASH / QUOTE SCREEN
   ============================================================ */
#splash-screen {
  z-index: 999;
  background: #000;
  cursor: pointer;
}
#splash-quote {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(16px, 4vw, 22px);
  color: var(--safety-orange);
  text-align: center;
  opacity: 0;
  line-height: 1.8;
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(255, 107, 0, 0.7), 0 0 30px rgba(255, 107, 0, 0.4);
  padding: 0 20px;
  max-width: 600px;
}
#splash-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(11px, 2.5vw, 14px);
  color: rgba(255, 140, 51, 0.6);
  text-align: center;
  opacity: 0;
  margin-top: 16px;
  letter-spacing: 1px;
  padding: 0 20px;
}
#splash-skip {
  position: absolute;
  bottom: calc(30px + env(safe-area-inset-bottom, 0px));
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 2px;
  opacity: 0;
}

/* ============================================================
   SECTION: TITLE SCREEN
   ============================================================ */
#title-screen {
  z-index: 200;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 0;
}

/* Matrix Rain */
#matrix-bg {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}
.matrix-col {
  position: absolute; top: 0;
  width: 22px; font-size: 16px; line-height: 1.2;
  white-space: pre;
  color: var(--safety-orange);
  opacity: 0.65;
  text-shadow: 0 0 8px rgba(255,107,0,0.9), 0 0 20px rgba(255,107,0,0.5), 0 0 40px rgba(255,80,0,0.25);
  animation: matrixFall linear infinite;
  writing-mode: vertical-rl;
}
@keyframes matrixFall {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}
.matrix-col-pulse { animation: matrixFall linear infinite, orangePulse 2s ease-in-out infinite alternate; }
.matrix-col-flash { animation: matrixFall linear infinite, orangeFlash 4s ease-in-out infinite; }
@keyframes orangePulse { 0% { opacity: 0.4; } 100% { opacity: 0.8; } }
@keyframes orangeFlash { 0%, 93% { opacity: 0.55; } 96% { opacity: 1.0; } 100% { opacity: 0.55; } }

/* Overlays */
#orange-glow {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse at 50% 15%, rgba(255,107,0,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 85%, rgba(200,80,0,0.10) 0%, transparent 50%),
    radial-gradient(ellipse at 20% 50%, rgba(255,107,0,0.05) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 50%, rgba(255,107,0,0.05) 0%, transparent 40%);
  pointer-events: none; z-index: 1;
}
.scanlines {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(255,107,0,0.012) 2px, rgba(255,107,0,0.012) 3px);
  opacity: 0.2; pointer-events: none; z-index: 100;
}
.vignette {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 70%, rgba(0,0,0,0.3) 100%);
  pointer-events: none; z-index: 99;
}

/* Title Logo */
#title-logo {
  z-index: 201; text-align: center; margin-top: 30px;
  position: relative;
  padding: 20px 40px;
}
#title-logo h1 {
  font-family: 'Share Tech Mono', monospace;
  font-weight: 700;
  font-size: clamp(48px, 14vw, 120px);
  line-height: 1;
  letter-spacing: 8px;
  color: #fff;
  text-shadow:
    0 0 10px rgba(255,107,0,0.8),
    0 0 30px rgba(255,107,0,0.5),
    0 0 60px rgba(255,107,0,0.3);
  text-align: center;
  animation: titleGlow 3s ease-in-out infinite alternate;
}
#title-cursor {
  display: inline-block;
  color: var(--safety-orange);
  animation: cursorBlink 1s step-end infinite;
}
@keyframes cursorBlink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}
@keyframes titleGlow {
  0% {
    text-shadow:
      0 0 10px rgba(255,107,0,0.6),
      0 0 25px rgba(255,107,0,0.35),
      0 0 50px rgba(255,107,0,0.2);
  }
  100% {
    text-shadow:
      0 0 15px rgba(255,107,0,0.9),
      0 0 40px rgba(255,107,0,0.6),
      0 0 80px rgba(255,107,0,0.35);
  }
}
#title-logo .subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(11px, 2.5vw, 16px);
  color: #e0e0e0;
  letter-spacing: 4px;
  margin-top: 10px;
  text-shadow: 0 0 6px rgba(255,255,255,0.3);
}

/* ============================================================
   SECTION: UI PANEL & COMPONENTS
   ============================================================ */
.ui-panel {
  background: var(--bg-panel);
  border: 1px solid var(--safety-orange);
  padding: 24px 28px;
  position: relative;
  z-index: 10;
  width: min(420px, 90%);
  margin: 16px auto;
  box-shadow: 0 0 8px rgba(255,107,0,0.4), 0 0 20px rgba(255,107,0,0.15), inset 0 0 8px rgba(255,107,0,0.03);
}
.ui-panel::before,
.ui-panel::after {
  content: ''; position: absolute;
  width: 14px; height: 14px;
  border-color: var(--safety-orange-light);
  border-style: solid;
}
.ui-panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.ui-panel::after  { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
.corner-bl, .corner-br {
  position: absolute; width: 14px; height: 14px;
  border-color: var(--safety-orange-light);
  border-style: solid;
}
.corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
.corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

/* Buttons */
.btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }

.btn {
  font-family: 'Share Tech Mono', 'Noto Sans JP', monospace;
  background: transparent;
  padding: 13px 20px;
  font-size: 15px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  text-align: center;
  width: 100%;
}
.btn::before {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0;
  transition: height 0.3s ease;
  z-index: -1;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

.btn-neon {
  border: 1px solid var(--safety-orange);
  color: #ffffff;
  box-shadow: 0 0 6px rgba(255,107,0,0.3), inset 0 0 6px rgba(255,107,0,0.03);
}
.btn-neon::before { background: rgba(255,107,0,0.1); }
.btn-neon:hover {
  background: rgba(255,107,0,0.12);
  box-shadow: 0 0 20px rgba(255,107,0,0.6), inset 0 0 20px rgba(255,107,0,0.08);
}
.btn-neon:hover::before { height: 100%; }

.btn-thin {
  border: 1px solid rgba(255,107,0,0.4);
  color: #ffcc99;
}
.btn-thin:hover {
  border-color: var(--safety-orange);
  color: #ffffff;
  box-shadow: 0 0 12px rgba(255,107,0,0.5);
}

/* Panel Footer */
.panel-footer {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-top: 16px; padding-top: 14px;
  border-top: 1px solid rgba(255,107,0,0.25);
  flex-wrap: wrap;
}
.lang-btn {
  background: transparent; border: 1px solid transparent;
  color: #997755; font-family: 'Noto Sans JP', sans-serif;
  font-size: 12px; padding: 4px 10px; cursor: pointer;
  transition: all 0.3s;
}
.lang-btn.active {
  color: var(--safety-orange); border-color: rgba(255,107,0,0.4);
}
.lang-btn:hover { color: var(--safety-orange); }
.footer-divider { color: #997755; font-size: 14px; }
.bgm-btn {
  background: transparent; border: 1px solid transparent;
  font-size: 13px; padding: 4px 10px; cursor: pointer;
  transition: all 0.3s; font-family: 'Share Tech Mono', monospace;
}
.bgm-btn.bgm-on { color: var(--safety-orange); border-color: rgba(255,107,0,0.4); }
.bgm-btn.bgm-off { color: var(--text-dim); text-decoration: line-through; }

.copyright {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-top: 8px;
  z-index: 10;
}

/* ============================================================
   SECTION: RULES / KNOWLEDGE SCREEN
   ============================================================ */
#rules-screen {
  z-index: 300;
  background: var(--bg-overlay);
}
.rules-container {
  width: min(640px, 92%);
  max-height: 88dvh; max-height: 88%;
  background: var(--bg-panel);
  border: 1px solid var(--safety-orange);
  box-shadow: 0 0 20px rgba(255,107,0,0.3), inset 0 0 10px rgba(255,107,0,0.03);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
@supports (max-height: 88dvh) { .rules-container { max-height: 88dvh; } }
.rules-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,107,0,0.3);
  flex-shrink: 0;
}
.rules-header h2 {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(16px, 4vw, 22px);
  color: var(--safety-orange);
  letter-spacing: 2px;
}
.rules-close-btn {
  background: transparent; border: 1px solid rgba(255,107,0,0.4);
  color: var(--safety-orange); font-size: 18px;
  width: 36px; height: 36px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
.rules-close-btn:hover { background: rgba(255,107,0,0.15); box-shadow: 0 0 10px rgba(255,107,0,0.4); }
.rules-scroll {
  overflow-y: auto; overflow-x: hidden;
  padding: 0 20px 20px;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}
.rules-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid rgba(255,107,0,0.25);
  margin-bottom: 16px;
  position: sticky; top: 0;
  background: var(--bg-panel);
  z-index: 5; padding-top: 12px;
  flex-wrap: wrap;
}
.rules-tab {
  flex: 1; min-width: 0;
  background: transparent; border: none; border-bottom: 2px solid transparent;
  color: var(--text-dim); font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(11px, 2.5vw, 13px); padding: 10px 4px;
  cursor: pointer; transition: all 0.3s; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rules-tab.active { color: var(--safety-orange); border-bottom-color: var(--safety-orange); }
.rules-tab:hover { color: var(--safety-orange-light); }
.rules-tab-content { display: none; }
.rules-tab-content.active { display: block; }

.rules-tab-content h3 {
  font-family: 'Share Tech Mono', 'Noto Sans JP', monospace;
  font-size: clamp(13px, 3vw, 16px);
  color: var(--safety-orange-light);
  margin: 20px 0 10px; letter-spacing: 1px;
  border-left: 3px solid var(--safety-orange);
  padding-left: 10px;
}
.rules-tab-content h3:first-child { margin-top: 4px; }
.rules-card {
  background: rgba(255,107,0,0.04);
  border: 1px solid rgba(255,107,0,0.15);
  padding: 12px 14px;
  margin-bottom: 12px;
}
.rules-steps { display: flex; flex-direction: column; gap: 8px; }
.rules-step {
  display: flex; align-items: flex-start; gap: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(12px, 2.8vw, 14px);
  color: var(--text-secondary); line-height: 1.6;
}
.step-num {
  flex-shrink: 0;
  width: 24px; height: 24px;
  background: var(--safety-orange);
  color: #000; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; border-radius: 2px;
}
.rules-score-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.rules-score-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px;
  background: rgba(255,107,0,0.04);
  border-left: 3px solid var(--safety-orange-dim);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(12px, 2.8vw, 14px);
  color: var(--text-secondary);
}
.score-pts {
  font-family: 'Share Tech Mono', monospace;
  color: var(--safety-orange); font-weight: 700;
}
.know-item {
  display: flex; align-items: flex-start; gap: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(12px, 2.8vw, 14px);
  color: var(--text-secondary); line-height: 1.6;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,107,0,0.08);
}
.know-item:last-child { border-bottom: none; }
.know-num {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border: 1px solid var(--safety-orange);
  color: var(--safety-orange); font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.dont-card { border-color: rgba(255,50,50,0.25); background: rgba(255,50,50,0.04); }
.dont-item {
  display: flex; align-items: flex-start; gap: 10px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(12px, 2.8vw, 14px);
  color: var(--text-secondary); line-height: 1.6;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255,50,50,0.1);
}
.dont-item:last-child { border-bottom: none; }
.dont-x {
  flex-shrink: 0;
  color: var(--alert-red); font-weight: 700; font-size: 16px;
  width: 22px; text-align: center;
}
.rules-text {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(12px, 2.8vw, 14px);
  color: var(--text-secondary); line-height: 1.8;
  margin: 8px 0;
}
.rules-date { color: var(--text-dim); font-size: clamp(11px, 2.2vw, 12px); margin-top: 16px; }
.rules-source-list {
  list-style: none; padding: 0;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(12px, 2.8vw, 13px);
  color: var(--text-secondary); line-height: 1.8;
}
.rules-source-list li { padding: 4px 0 4px 16px; position: relative; }
.rules-source-list li::before { content: '・'; position: absolute; left: 0; color: var(--safety-orange); }

/* ============================================================
   SECTION: RESPONSIVE
   ============================================================ */

/* --- PC/モバイル判定 --- */
@media (hover: hover) and (pointer: fine) {
  .mobile-only { display: none !important; }
}
@media (hover: none) and (pointer: coarse) {
  .pc-only { display: none !important; }
}

/* --- スマホ共通（幅480px以下） --- */
@media (max-width: 480px) {
  .ui-panel { padding: 18px 16px; }
  .btn { padding: 12px 14px; font-size: 14px; min-height: 44px; }
  #warning-box { padding: 28px 20px; }
  #warning-box p { font-size: clamp(13px, 3.5vw, 16px); line-height: 1.8; }
  #btn-warning-ok { padding: 14px 40px; font-size: 16px; min-height: 48px; }
  #splash-quote { font-size: clamp(15px, 4.5vw, 20px); padding: 0 24px; max-width: 90vw; }
  #splash-sub { font-size: clamp(10px, 2.5vw, 13px); }
}

/* --- 縦向きスマホ --- */
@media (max-width: 500px) and (orientation: portrait) {
  #title-screen { padding: 10px 0; }
  #title-logo { margin-top: 10px; padding: 12px 20px; }
  #title-logo h1 { font-size: clamp(40px, 12vw, 64px); letter-spacing: 4px; }
  #title-logo .subtitle { font-size: clamp(10px, 2.5vw, 13px); margin-top: 6px; }
  .ui-panel { margin: 8px auto; padding: 16px 14px; width: min(380px, 88%); }
  .btn { padding: 12px 14px; font-size: 14px; min-height: 44px; }
  .btn-group { gap: 8px; margin-top: 10px; }
  .panel-footer { margin-top: 10px; padding-top: 10px; gap: 8px; }
  .copyright { margin-top: 6px; font-size: 10px; }
}

/* --- 横向きスマホ（高さ500px以下） --- */
@media (orientation: landscape) and (max-height: 500px) {
  #title-screen {
    flex-direction: row;
    justify-content: center;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    overflow-y: hidden;
  }
  #title-logo { margin-top: 0; padding: 4px 16px; flex-shrink: 0; }
  #title-logo h1 { font-size: clamp(28px, 7vw, 48px); letter-spacing: 4px; }
  #title-logo .subtitle { font-size: 10px; margin-top: 2px; }
  .ui-panel {
    padding: 8px 12px; margin: 0;
    width: min(300px, 45vw);
    max-height: calc(100vh - 16px);
    overflow-y: auto;
  }
  .btn { padding: 7px 10px; font-size: 12px; min-height: 36px; }
  .btn-group { gap: 5px; margin-top: 6px; }
  .panel-footer { margin-top: 6px; padding-top: 6px; gap: 6px; }
  .copyright { margin-top: 2px; font-size: 9px; }

  /* 横向き: 警告・格言もコンパクトに */
  #warning-box { padding: 20px 24px; max-width: 80vw; }
  #warning-box p { font-size: clamp(12px, 2vw, 14px); line-height: 1.6; margin-bottom: 8px; }
  #btn-warning-ok { padding: 10px 32px; }
  #splash-quote { font-size: clamp(14px, 3vw, 18px); }
  #splash-skip { bottom: 10px; }

  /* 横向き: ルール画面 */
  .rules-container { max-height: 92dvh; max-height: 92%; width: min(90%, 700px); }
  .rules-header { padding: 10px 16px; }
  .rules-scroll { padding: 0 16px 12px; }
  .rules-tabs { padding-top: 8px; }
  .rules-tab { padding: 8px 4px; font-size: clamp(10px, 2vw, 12px); }
}

/* --- 小型スマホ縦向き（iPhone SE等 高さ600px以下） --- */

// ============================================================
// SECTION: SOUND MANAGER
// ============================================================
const SoundManager = {
  audioCtx: null,
  seEnabled: true,

  getCtx() {
    if (!this.audioCtx) {
      try {
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { return null; }
    }
    if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    return this.audioCtx;
  },

  playSE(type) {
    if (!this.seEnabled) return;
    try {
      const ctx = this.getCtx();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      const now = ctx.currentTime;

      const conf = {
        hover:  { f: 1400, d: 0.06, t: 'sine',     g: 0.30, sweep: 1800 },
        click:  { f: 600,  d: 0.10, t: 'sine',     g: 0.35, sweep: 1200 },
        tab:    { f: 900,  d: 0.08, t: 'sine',     g: 0.25, sweep: 1500 },
        close:  { f: 1200, d: 0.08, t: 'sine',     g: 0.25, sweep: 600 },
        error:  { f: 400,  d: 0.20, t: 'sawtooth', g: 0.30, sweep: 150 }
      }[type] || { f: 800, d: 0.1, t: 'sine', g: 0.30 };

      gain.gain.setValueAtTime(conf.g, now);
      osc.type = conf.t;
      osc.frequency.setValueAtTime(conf.f, now);
      if (conf.sweep) osc.frequency.linearRampToValueAtTime(conf.sweep, now + conf.d);
      gain.gain.linearRampToValueAtTime(0, now + conf.d);
      osc.start(now);
      osc.stop(now + conf.d);
    } catch (e) {}
  }
};

function initUISounds() {

}

function initWarning() {
  // 初回のみ表示（OKを押すとlocalStorageに保存）
  const seen = localStorage.getItem('jishin_warning_seen');
  if (seen === 'true') {
    warningShown = true;
    showSplash();
    return;
  }
  showScreen('warning-screen');
  const btn = document.getElementById('btn-warning-ok');
  btn.addEventListener('click', function handler() {
    btn.removeEventListener('click', handler);
    localStorage.setItem('jishin_warning_seen', 'true');
    warningShown = true;
    showSplash();
  });
  btn.addEventListener('touchstart', function handler(e) {
    e.preventDefault();
    btn.removeEventListener('touchstart', handler);
    localStorage.setItem('jishin_warning_seen', 'true');
    warningShown = true;
    showSplash();
  });
}

let splashTimeout = null;

function showSplash() {
  showScreen('splash-screen');
  const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];

  subEl.textContent = currentLang === 'ja' ? quote.en : quote.ja;

  // フェードインアニメーション
  quoteEl.style.opacity = '0';
  subEl.style.opacity = '0';
  skipEl.style.opacity = '0';

  setTimeout(() => {
    quoteEl.style.transition = 'opacity 1s ease';
    quoteEl.style.opacity = '1';
  }, 300);
  setTimeout(() => {
    subEl.style.transition = 'opacity 0.8s ease';
    subEl.style.opacity = '1';
  }, 800);
  setTimeout(() => {
    skipEl.style.transition = 'opacity 0.5s ease';
    skipEl.style.opacity = '1';
  }, 1500);

  // 4秒後にタイトルへ
  splashTimeout = setTimeout(() => {
    fadeToTitle();
  }, 4000);

  // タップ/クリックでスキップ
  const splash = document.getElementById('splash-screen');
  function skipHandler(e) {
    e.preventDefault();
    splash.removeEventListener('click', skipHandler);
    splash.removeEventListener('touchstart', skipHandler);
    if (splashTimeout) clearTimeout(splashTimeout);
    fadeToTitle();
  }
  splash.addEventListener('click', skipHandler);
  splash.addEventListener('touchstart', skipHandler);
}

function fadeToTitle() {
  const splash = document.getElementById('splash-screen');
  splash.style.transition = 'opacity 0.6s ease';
  splash.style.opacity = '0';
  setTimeout(() => {
    splash.style.opacity = '';
    splash.style.transition = '';
    showTitle();
  }, 600);
}

// ============================================================
// SECTION: MATRIX BACKGROUND
// ============================================================
function createMatrixBg() {
  const container = document.getElementById('matrix-bg');
  if (!container) return;
  container.innerHTML = '';

  const colCount = Math.floor(window.innerWidth / 22);
  for (let i = 0; i < colCount; i++) {
    const col = document.createElement('div');
    col.className = 'matrix-col';

    // ランダムな明度バリエーション
    const rand = Math.random();
    if (rand < 0.05) {
      col.className = 'matrix-col matrix-col-flash';
    } else if (rand < 0.35) {
      col.className = 'matrix-col matrix-col-pulse';
    }

    // 文字列生成（防災関連漢字を含む — 画面高さを十分カバーする文字数）
    const len = 30 + Math.floor(Math.random() * 25);
    let text = '';
    for (let j = 0; j < len; j++) {
      text += MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
    }
    col.textContent = text;

    col.style.left = (i * 22) + 'px';
    col.style.animationDuration = (5 + Math.random() * 10) + 's';
    col.style.animationDelay = (-Math.random() * 15) + 's';

    container.appendChild(col);
  }
}

// ============================================================
// SECTION: TITLE SCREEN
// ============================================================
function showTitle() {
  showScreen('title-screen');
  applyI18N();
  createMatrixBg();
}

// ============================================================
// SECTION: EVENT LISTENERS
// ============================================================
function initEventListeners() {
  // 言語切替
  document.getElementById('lang-ja').addEventListener('click', () => {
    currentLang = 'ja';
    localStorage.setItem('jishin_language', 'ja');
    document.getElementById('lang-ja').classList.add('active');
    document.getElementById('lang-en').classList.remove('active');
    applyI18N();
  });
  document.getElementById('lang-en').addEventListener('click', () => {
    currentLang = 'en';
    localStorage.setItem('jishin_language', 'en');
    document.getElementById('lang-en').classList.add('active');
    document.getElementById('lang-ja').classList.remove('active');
    applyI18N();
  });

  // BGMトグル
  document.getElementById('bgm-toggle').addEventListener('click', () => {
    bgmEnabled = !bgmEnabled;
    localStorage.setItem('jishin_bgm', bgmEnabled ? 'on' : 'off');
    const btn = document.getElementById('bgm-toggle');
    btn.textContent = 'BGM: ' + (bgmEnabled ? 'ON' : 'OFF');
    btn.className = 'bgm-btn ' + (bgmEnabled ? 'bgm-on' : 'bgm-off');
  });

  // ルール / 防災知識画面
  document.getElementById('btn-rules').addEventListener('click', () => {
    showScreen('rules-screen');
    applyI18N();
  });
  document.getElementById('rules-close-btn').addEventListener('click', () => {
    showTitle();
  });
  // タブ切替
  document.querySelectorAll('.rules-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.rules-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.rules-tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      const target = document.getElementById(this.getAttribute('data-tab'));
      if (target) target.classList.add('active');
      // スクロール位置をリセット
      document.querySelector('.rules-scroll').scrollTop = 0;
    });
  });

  // リサイズ対応（マトリックス背景再生成 + レイアウト）
  let resizeTimer = null;
  function handleResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    const isLandscape = w > h;
    document.body.classList.toggle('landscape', isLandscape);
    document.body.classList.toggle('portrait', !isLandscape);

    // マトリックス背景を再生成（タイトル画面表示中のみ）
    if (document.getElementById('title-screen').classList.contains('active')) {
      createMatrixBg();
    }
  }

  window.addEventListener('resize', () => {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(handleResize, 150);
  });
  window.addEventListener('orientationchange', () => {
    setTimeout(handleResize, 100);
    setTimeout(handleResize, 300);
  });

  // 初回レイアウト設定
  handleResize();

  // タッチイベントのスクロール防止（ゲーム画面用）
  document.addEventListener('touchmove', function(e) {
    // モーダル・ルール画面・スクロール可能な要素内では許可
    if (e.target.closest('.ui-panel') || e.target.closest('.modal-box')) return;
    if (e.target.closest('#title-screen')) return;
    if (e.target.closest('.rules-container')) return;
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
}

// ============================================================
// SECTION: INIT
// ============================================================
function init() {
  // ローカルストレージから設定読み込み
  const savedLang = localStorage.getItem('jishin_language');
  if (savedLang === 'en') {
    currentLang = 'en';
    document.getElementById('lang-en').classList.add('active');
    document.getElementById('lang-ja').classList.remove('active');
  }
  const savedBgm = localStorage.getItem('jishin_bgm');
  if (savedBgm === 'off') {
    bgmEnabled = false;
    const btn = document.getElementById('bgm-toggle');
    btn.textContent = 'BGM: OFF';
    btn.className = 'bgm-btn bgm-off';
  }

  initEventListeners();
  initUISounds();
  initWarning();
}

document.addEventListener('DOMContentLoaded', init);
</script>
